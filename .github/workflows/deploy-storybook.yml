name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Chrome is only needed for stencil e2e tests, not for building
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install SWC native binding for Linux
        # package-lock.json was generated on Windows and lacks the Linux
        # variant of @swc/core's optional platform packages (npm/cli#4828)
        run: npm install --no-save @swc/core-linux-x64-gnu@"$(node -p "require('@swc/core/package.json').version")"

      - name: Build stencil components (generates loader used by Storybook preview)
        run: npm run build
        working-directory: packages/stencil

      - name: Build Storybook
        run: npm run build-storybook
        working-directory: packages/stencil

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/stencil/storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
